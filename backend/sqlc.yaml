version: "2"
sql:
  - engine: "postgresql"
    queries: "internal/adapters/postgres/queries/"
    schema: "db/migrations/"
    gen:
      go:
        package: "db"
        out: "internal/adapters/postgres/generated"
        emit_json_tags: true
        emit_pointers_for_null_fields: true
        emit_enum_valid_method: true
