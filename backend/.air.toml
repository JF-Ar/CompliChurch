root = "."
tmp_dir = "tmp"

[build]
  bin = "./tmp/main"
  cmd = "go build -o ./tmp/main ./cmd/api"
  delay = 1000
  exclude_dir = ["tmp", "vendor", "internal/adapters/postgres/generated"]
  include_ext = ["go"]
  stop_on_error = true
  kill_delay = "0s"

[log]
  time = true

[misc]
  clean_on_exit = true
