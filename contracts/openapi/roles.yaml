paths:

  /roles:
    get:
      tags: [Roles]
      summary: List all roles
      description: "Required role: leadership. Returns system roles + church custom roles."
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Role"
    post:
      tags: [Roles]
      summary: Create custom role
      description: "Required role: pastor"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RoleCreate"
      responses:
        "201":
          description: Role created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Role"

  /roles/{id}:
    put:
      tags: [Roles]
      summary: Update custom role
      description: "Required role: pastor. System roles cannot be updated."
      parameters:
        - name: id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/UUID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RoleCreate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Role"
        "403":
          $ref: "#/components/responses/Forbidden"
    delete:
      tags: [Roles]
      summary: Delete custom role
      description: "Required role: pastor. System roles cannot be deleted."
      parameters:
        - name: id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/UUID"
      responses:
        "204":
          description: Deleted
        "403":
          $ref: "#/components/responses/Forbidden"

components:
  schemas:

    Role:
      type: object
      properties:
        id:
          $ref: "#/components/schemas/UUID"
        church_id:
          $ref: "#/components/schemas/UUID"
          nullable: true
        name:
          type: string
          example: "Presbyter"
        base_profile:
          type: string
          enum: [pastor, leadership, musician, member]
        is_system:
          type: boolean

    RoleSummary:
      type: object
      properties:
        id:
          $ref: "#/components/schemas/UUID"
        name:
          type: string
        base_profile:
          type: string
          enum: [pastor, leadership, musician, member]

    RoleCreate:
      type: object
      required: [name, base_profile]
      properties:
        name:
          type: string
          example: "Presbyter"
        base_profile:
          type: string
          enum: [pastor, leadership, musician, member]

    RoleAssign:
      type: object
      required: [role_id]
      properties:
        role_id:
          $ref: "#/components/schemas/UUID"
