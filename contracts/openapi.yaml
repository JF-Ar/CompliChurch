              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/AvailabilitySlot"
    post:
      tags: [Agenda]
      summary: Create availability slot
      description: "Required role: pastor"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AvailabilitySlotCreate"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AvailabilitySlot"

  /agenda/slots/{id}:
    put:
      tags: [Agenda]
      summary: Update availability slot
      description: "Required role: pastor"
      parameters:
        - name: id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/UUID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AvailabilitySlotCreate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AvailabilitySlot"
    delete:
      tags: [Agenda]
      summary: Remove availability slot
      description: "Required role: pastor"
      parameters:
        - name: id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/UUID"
      responses:
        "204":
          description: Deleted

  /agenda/events:
    get:
      tags: [Agenda]
      summary: List events
      description: |
        Members see only confirmed events.
        Leadership and above see all statuses.
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [requested, confirmed, declined, cancelled]
        - name: from
          in: query
          schema:
            $ref: "#/components/schemas/Date"
        - name: to
          in: query
          schema:
            $ref: "#/components/schemas/Date"
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: per_page
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/EventSummary"
                  meta:
                    $ref: "#/components/schemas/PaginationMeta"
    post:
      tags: [Agenda]
      summary: Request an appointment
      description: "Any authenticated member can request. Status starts as 'requested'."
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EventCreate"
      responses:
        "201":
          description: Request created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Event"

  /agenda/events/{id}:
    get:
      tags: [Agenda]
      summary: Get event detail
      description: "Members can only see confirmed events. Leadership sees all."
      parameters:
        - name: id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/UUID"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Event"
        "404":
          $ref: "#/components/responses/NotFound"
    put:
      tags: [Agenda]
      summary: Update event
      description: "Required role: pastor"
      parameters:
        - name: id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/UUID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EventUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Event"

  /agenda/events/{id}/confirm:
    post:
      tags: [Agenda]
      summary: Confirm event
      description: "Required role: pastor. Sends Google Calendar invite to attendees."
      parameters:
        - name: id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/UUID"
      responses:
        "200":
          description: Confirmed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Event"
        "409":
          $ref: "#/components/responses/Conflict"

  /agenda/events/{id}/decline:
    post:
      tags: [Agenda]
      summary: Decline event request
      description: "Required role: pastor. Sends email to requester with decline_reason."
      parameters:
        - name: id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/UUID"
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EventDecline"
      responses:
        "200":
          description: Declined
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Event"

  /agenda/events/{id}/cancel:
    post:
      tags: [Agenda]
      summary: Cancel confirmed event
      description: "Required role: pastor. Cancels Google Calendar invite."
      parameters:
        - name: id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/UUID"
      responses:
        "200":
          description: Cancelled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Event"

