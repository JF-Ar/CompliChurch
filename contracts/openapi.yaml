    get:
      tags: [Agenda]
      summary: List attendees
      description: "Required role: leadership"
      parameters:
        - name: id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/UUID"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/EventAttendee"
    post:
      tags: [Agenda]
      summary: Add attendee
      description: "Required role: pastor"
      parameters:
        - name: id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/UUID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EventAttendeeAdd"
      responses:
        "201":
          description: Attendee added

